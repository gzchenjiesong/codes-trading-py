<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no">
<title>大盘行情 - 网格交易系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#333;font-size:14px}
.navbar{background:linear-gradient(135deg,#07c160,#06ad56);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.navbar h1{font-size:17px;font-weight:600}
.nav-links{display:flex;gap:12px;align-items:center}
.nav-links a{color:rgba(255,255,255,.85);text-decoration:none;font-size:13px;padding:4px 8px;border-radius:4px}
.nav-links a:hover,.nav-links a.active{background:rgba(255,255,255,.2);color:#fff}
.container{max-width:960px;margin:0 auto;padding:12px}
.section-title{font-size:15px;font-weight:600;margin:16px 0 10px;display:flex;align-items:center;gap:6px}

/* 大盘指数 */
.indices-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
@media(max-width:600px){.indices-grid{grid-template-columns:repeat(2,1fr)}}
.idx-card{background:#fff;border-radius:10px;padding:12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.idx-card .name{font-size:13px;color:#666;margin-bottom:4px}
.idx-card .price{font-size:20px;font-weight:700;font-family:monospace}
.idx-card .change{font-size:13px;font-weight:600;margin-top:2px}
.up{color:#e74c3c}
.down{color:#2e7d32}
.flat{color:#999}

/* ETF 列表 */
.etf-table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:12px}
.etf-table th{background:#f8f9fa;padding:8px 6px;text-align:center;font-size:12px;color:#666;font-weight:600;border-bottom:2px solid #e9ecef;white-space:nowrap}
.etf-table td{padding:7px 6px;text-align:center;font-size:13px;border-bottom:1px solid #f5f5f5}
.etf-table tr:last-child td{border-bottom:none}
.etf-table .name-cell{text-align:left;padding-left:12px}
.etf-table .etf-name{font-weight:500;display:block}
.etf-table .etf-code{font-size:11px;color:#999}
.price-col{font-family:monospace;font-weight:600}
.up-col{color:#e74c3c}
.down-col{color:#2e7d32}

/* K 线弹窗 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;width:95%;max-width:500px;max-height:80vh;padding:16px;overflow:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.modal-title{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#999}
.canvas-wrap{width:100%;height:220px;background:#fafafa;border-radius:8px}
.loading{text-align:center;padding:40px;color:#999}
.kline-btn{background:none;border:1px solid #07c160;color:#07c160;padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer}
.kline-btn:hover{background:#07c160;color:#fff}
</style>
</head>
<body>

<div class="navbar">
  <h1>📊 大盘行情</h1>
  <div class="nav-links">
    <a href="/">标的</a>
    <a href="/market" class="active">市场</a>
    <a href="/news">资讯</a>
  </div>
</div>

<div class="container">
  <!-- 大盘指数 -->
  <div class="section-title">🌍 大盘指数</div>
  <div class="indices-grid" id="indices-grid">
    <div class="loading" style="grid-column:1/-1">加载中...</div>
  </div>

  <!-- ETF 行情 -->
  <div class="section-title">📈 关注 ETF / LOF</div>
  <table class="etf-table" id="etf-table">
    <thead><tr>
      <th class="name-cell">名称</th><th>现价</th><th>涨跌幅</th><th>昨收</th><th>操作</th>
    </tr></thead>
    <tbody id="etf-body">
      <tr><td colspan="5" class="loading">加载中...</td></tr>
    </tbody>
  </table>
</div>

<!-- K 线弹窗 -->
<div class="modal-overlay" id="kline-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="kline-title">K 线图</span>
      <button class="modal-close" onclick="closeKlineModal()">×</button>
    </div>
    <div class="canvas-wrap">
      <canvas id="kline-canvas" style="width:100%;height:100%"></canvas>
    </div>
  </div>
</div>

<script>
// ── 工具函数 ──
function fmtPrice(p) {
  if (!p) return '--';
  return p < 10 ? p.toFixed(4) : p < 100 ? p.toFixed(3) : p.toFixed(2);
}

function changeClass(val) {
  return val > 0 ? 'up-col' : val < 0 ? 'down-col' : '';
}

function changeSign(val) {
  return val > 0 ? '+' : '';
}

// ── 大盘指数 ──
async function loadIndices() {
  try {
    const resp = await fetch('/api/market/indices');
    const data = await resp.json();
    const grid = document.getElementById('indices-grid');
    if (data.code !== 0) { grid.innerHTML = '<div class="loading" style="grid-column:1/-1">加载失败</div>'; return; }
    grid.innerHTML = (data.data || []).map(idx => {
      const pct = idx.change_pct || 0;
      const cls = pct > 0 ? 'up' : pct < 0 ? 'down' : 'flat';
      const sign = changeSign(pct);
      const chgVal = idx.change || 0;
      return `<div class="idx-card">
        <div class="name">${idx.name}</div>
        <div class="price">${fmtPrice(idx.price)}</div>
        <div class="change ${cls}">${sign}${pct.toFixed(2)}%  (${sign}${chgVal.toFixed(2)})</div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('indices-grid').innerHTML = '<div class="loading" style="grid-column:1/-1">网络错误</div>';
  }
}

// ── ETF 行情 ──
async function loadETFs() {
  try {
    const resp = await fetch('/api/market/quotes');
    const data = await resp.json();
    const tbody = document.getElementById('etf-body');
    if (data.code !== 0) { tbody.innerHTML = '<tr><td colspan="5">加载失败</td></tr>'; return; }
    tbody.innerHTML = (data.data || []).map(etf => {
      const pct = etf.change_pct || 0;
      const cls = changeClass(pct);
      const sign = changeSign(pct);
      return `<tr>
        <td class="name-cell"><span class="etf-name">${etf.name}</span><span class="etf-code">${etf.code}</span></td>
        <td class="price-col ${cls}">${fmtPrice(etf.price)}</td>
        <td class="${cls}">${sign}${pct.toFixed(2)}%</td>
        <td style="color:#999">${fmtPrice(etf.prev_close)}</td>
        <td><button class="kline-btn" onclick="openKline('${etf.code}','${etf.market||'sh'}','${etf.name}')">K线</button></td>
      </tr>`;
    }).join('');
  } catch(e) {
    document.getElementById('etf-body').innerHTML = '<tr><td colspan="5">网络错误</td></tr>';
  }
}

// ── K 线弹窗 ──
async function openKline(code, market, name) {
  document.getElementById('kline-title').textContent = name + ' K线图';
  document.getElementById('kline-modal').classList.add('show');

  const canvas = document.getElementById('kline-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = canvas.offsetHeight * 2;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#999'; ctx.font = '24px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('加载中...', canvas.width/2, canvas.height/2);

  try {
    const resp = await fetch(`/api/market/kline/${code}?market=${market}&days=60`);
    const data = await resp.json();
    if (data.code !== 0 || !data.data || data.data.length === 0) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillText('暂无数据', canvas.width/2, canvas.height/2);
      return;
    }
    drawKline(ctx, canvas.width, canvas.height, data.data);
  } catch(e) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillText('加载失败', canvas.width/2, canvas.height/2);
  }
}

function drawKline(ctx, w, h, data) {
  ctx.clearRect(0, 0, w, h);
  const pad = {l:60, r:20, t:20, b:30};
  const cw = w - pad.l - pad.r;
  const ch = h - pad.t - pad.b;
  const n = data.length;
  const barW = Math.max(4, cw / n * 0.6);
  const gap = cw / n;

  const highs = data.map(d => d.high);
  const lows = data.map(d => d.low);
  const maxP = Math.max(...highs);
  const minP = Math.min(...lows);
  const range = maxP - minP || 1;

  // 价格轴
  ctx.fillStyle = '#bbb'; ctx.font = '18px monospace'; ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const p = maxP - range * i / 4;
    const y = pad.t + ch * i / 4;
    ctx.fillText(p.toFixed(3), pad.l - 6, y + 6);
    ctx.strokeStyle = '#f0f0f0'; ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(w - pad.r, y); ctx.stroke();
  }

  // K 线
  data.forEach((d, i) => {
    const x = pad.l + gap * i + gap / 2;
    const yH = pad.t + (maxP - d.high) / range * ch;
    const yL = pad.t + (maxP - d.low) / range * ch;
    const yO = pad.t + (maxP - d.open) / range * ch;
    const yC = pad.t + (maxP - d.close) / range * ch;

    const up = d.close >= d.open;
    ctx.strokeStyle = up ? '#e74c3c' : '#2e7d32';
    ctx.fillStyle = up ? '#e74c3c' : '#2e7d32';

    // 影线
    ctx.beginPath(); ctx.moveTo(x, yH); ctx.lineTo(x, yL); ctx.stroke();
    // 实体
    const top = Math.min(yO, yC);
    const height = Math.max(1, Math.abs(yC - yO));
    ctx.fillRect(x - barW / 2, top, barW, height);
  });

  // 日期轴
  ctx.fillStyle = '#ccc'; ctx.font = '16px sans-serif'; ctx.textAlign = 'center';
  [0, Math.floor(n / 2), n - 1].forEach(i => {
    const d = data[i];
    if (d && d.date) {
      const x = pad.l + gap * i + gap / 2;
      ctx.fillText(d.date.slice(5), x, h - 4);
    }
  });
}

function closeKlineModal() {
  document.getElementById('kline-modal').classList.remove('show');
}

document.getElementById('kline-modal').addEventListener('click', function(e) {
  if (e.target === this) closeKlineModal();
});

// ── 初始化 ──
loadIndices();
loadETFs();
</script>
</body>
</html>
