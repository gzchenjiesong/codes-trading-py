<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no">
<title>网格交易管理系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#333;font-size:14px}
.navbar{background:linear-gradient(135deg,#07c160,#06ad56);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.navbar h1{font-size:17px;font-weight:600}
.user-badge{display:flex;align-items:center;gap:6px;font-size:13px;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:16px;cursor:pointer}
.user-badge:hover{background:rgba(255,255,255,.3)}
.container{max-width:960px;margin:0 auto;padding:12px}
.login-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:20px}
.login-page .logo{width:80px;height:80px;background:linear-gradient(135deg,#07c160,#06ad56);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;color:#fff;margin-bottom:24px;box-shadow:0 4px 16px rgba(7,193,96,.3)}
.login-page h2{font-size:22px;font-weight:600;margin-bottom:8px}
.login-page p{color:#999;margin-bottom:32px;font-size:14px}
.btn-login{background:#07c160;color:#fff;border:none;padding:12px 48px;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer}
.btn-login:hover{background:#06ad56}
.stock-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer}
.stock-card:active{transform:scale(.98)}
.stock-card .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.stock-card .name{font-size:16px;font-weight:600}
.stock-card .code{font-size:12px;color:#999;margin-left:6px}
.stock-card .price{font-size:20px;font-weight:700;font-family:monospace}
.stock-card .meta{display:flex;gap:16px;font-size:12px;color:#999;margin-top:8px;flex-wrap:wrap}
.stock-card .label{color:#bbb}
.mode-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;background:#e8f5e9;color:#07c160;font-weight:500}
.add-stock-btn{width:100%;padding:14px;background:#fff;border:2px dashed #ddd;border-radius:12px;color:#999;font-size:14px;cursor:pointer}
.add-stock-btn:hover{border-color:#07c160;color:#07c160}
.detail-header{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.back-btn{background:none;border:none;color:#07c160;font-size:14px;cursor:pointer;padding:0;margin-bottom:8px}
.detail-header .title{font-size:20px;font-weight:700}
.detail-header .subtitle{font-size:12px;color:#999}
.price-input-row{display:flex;gap:8px;margin-top:12px;align-items:center}
.price-input-row input{flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;font-family:monospace}
.price-input-row button{background:#07c160;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;white-space:nowrap}
.panel{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.panel-title{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.grid-table{width:100%;border-collapse:collapse;font-size:12px;font-family:monospace}
.grid-table th{background:#f8f9fa;padding:6px 4px;text-align:center;font-weight:600;font-size:11px;color:#666;border-bottom:2px solid #e9ecef;white-space:nowrap}
.grid-table td{padding:5px 4px;text-align:center;border-bottom:1px solid #f0f0f0}
.grid-table .type-sgrid{background:#e8f5e9;color:#2e7d32;font-weight:600;font-size:11px}
.grid-table .type-mgrid{background:#fff3e0;color:#e65100;font-weight:600;font-size:11px}
.grid-table .type-lgrid{background:#e3f2fd;color:#1565c0;font-weight:600;font-size:11px}
.grid-table .buy-cell{background:#e8f5e9;color:#2e7d32;font-weight:500}
.grid-table .sell-cell{background:#fce4ec;color:#c62828;font-weight:500}
.grid-table .triggered{border-left:3px solid #e74c3c}
.grid-table .profit{color:#e74c3c}
.grid-table .loss{color:#07c160}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-item{text-align:center;padding:10px 8px;background:#f8f9fa;border-radius:8px}
.stat-item .value{font-size:17px;font-weight:700;font-family:monospace}
.stat-item .label{font-size:11px;color:#999;margin-top:2px}
.stat-item .value.profit{color:#e74c3c}
.stat-item .value.loss{color:#07c160}
.trade-list{list-style:none}
.trade-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0}
.trade-item:last-child{border-bottom:none}
.trade-item .info{display:flex;align-items:center;gap:8px}
.type-badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.type-badge.buy{background:#e8f5e9;color:#2e7d32}
.type-badge.sell{background:#fce4ec;color:#c62828}
.price-count{font-family:monospace;font-size:13px}
.trade-date{font-size:11px;color:#999}
.delete-btn{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:4px}
.delete-btn:hover{color:#e74c3c}
.empty{text-align:center;padding:40px 20px;color:#ccc}
.empty .icon{font-size:48px;margin-bottom:12px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.tab-bar{display:flex;background:#fff;border-top:1px solid #eee;position:fixed;bottom:0;left:0;right:0;z-index:100}
.tab-bar button{flex:1;padding:8px 0;text-align:center;border:none;background:none;font-size:11px;color:#999;cursor:pointer}
.tab-bar button.active{color:#07c160}
.tab-bar button .tab-icon{font-size:20px;display:block}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal-content{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;padding:20px;animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-content h3{font-size:17px;font-weight:600;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;color:#666;margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn-row button{flex:1;padding:12px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
.btn-cancel{background:#f5f5f5;border:none;color:#666}
.btn-submit{background:#07c160;border:none;color:#fff}
.pb-60{padding-bottom:60px}
@media(min-width:768px){
  .container{padding:20px}
  .stat-grid{grid-template-columns:repeat(6,1fr)}
  .grid-table{font-size:13px}
}
</style>
</head>
<body>

<div class="navbar">
  <h1>📊 网格交易</h1>
  <div style="display:flex;gap:10px;align-items:center">
    <a href="/" style="color:rgba(255,255,255,.9);text-decoration:none;font-size:13px;padding:4px 8px;border-radius:4px;background:rgba(255,255,255,.2)">标的</a>
    <a href="/market" style="color:rgba(255,255,255,.85);text-decoration:none;font-size:13px;padding:4px 8px;border-radius:4px">行情</a>
    <a href="/news" style="color:rgba(255,255,255,.85);text-decoration:none;font-size:13px;padding:4px 8px;border-radius:4px">资讯</a>
  </div>
  <div class="user-badge" id="userBadge" onclick="showUserMenu()" style="display:none">
    <span>👤</span><span id="userName">-</span>
  </div>
</div>

<div class="container pb-60" id="app"></div>
<div class="toast" id="toast"></div>

<div class="tab-bar" id="tabBar" style="display:none">
  <button onclick="window.location.href='/news'"><span class="tab-icon">📰</span>资讯</button>
  <button onclick="window.location.href='/market'"><span class="tab-icon">📈</span>行情</button>
  <button class="active" onclick="switchTab('stocks')"><span class="tab-icon">📋</span>标的</button>
  <button onclick="openModal('addStockModal')"><span class="tab-icon">➕</span>添加</button>
</div>

<!-- Add Stock Modal -->
<div class="modal-overlay" id="addStockModal">
  <div class="modal-content">
    <h3>添加标的</h3>
    <div class="form-group"><label>代码</label><input id="stockCode" placeholder="如 159869"></div>
    <div class="form-group"><label>名称</label><input id="stockName" placeholder="如 游戏ETF"></div>
    <div class="form-row">
      <div class="form-group"><label>市场</label><select id="stockMarket"><option value="sz">深市</option><option value="sh">沪市</option></select></div>
      <div class="form-group"><label>模式</label><select id="stockMode"><option value="m1">模式1</option><option value="m2">模式2</option><option value="m3">模式3</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>基础资金</label><input type="number" id="stockBaseCash" value="10000"></div>
      <div class="form-group"><label>小网步进%</label><input type="number" id="stockSgridStep" value="3" step="0.5"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>中网步进%</label><input type="number" id="stockMgridStep" value="5" step="0.5"></div>
      <div class="form-group"><label>大网步进%</label><input type="number" id="stockLgridStep" value="5" step="0.5"></div>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal('addStockModal')">取消</button>
      <button class="btn-submit" onclick="submitStock()">确认添加</button>
    </div>
  </div>
</div>

<!-- Add Trade Modal -->
<div class="modal-overlay" id="addTradeModal">
  <div class="modal-content">
    <h3>添加交易</h3>
    <div class="form-row">
      <div class="form-group"><label>类型</label><select id="tradeType"><option value="BUY">买入</option><option value="SELL">卖出</option></select></div>
      <div class="form-group"><label>日期</label><input type="date" id="tradeDate"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>价格</label><input type="number" id="tradePrice" step="0.001" placeholder="0.000"></div>
      <div class="form-group"><label>数量</label><input type="number" id="tradeCount" step="100" placeholder="100"></div>
    </div>
    <div class="form-group"><label>网格标签</label><input id="tradeGridLabel" placeholder="如 sgrid1"></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal('addTradeModal')">取消</button>
      <button class="btn-submit" onclick="submitTrade()">确认添加</button>
    </div>
  </div>
</div>

<script>
let currentUser=null,currentStockId=null;

async function api(path,opts={}){
  const r=await fetch(path,{credentials:'include',headers:{'Content-Type':'application/json'},...opts,body:opts.body?JSON.stringify(opts.body):undefined});
  return r.json();
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function openModal(id){document.getElementById(id).classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}

document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('show')});
});

async function init(){
  const r=await api('/api/auth/me');
  if(r.code===0){currentUser=r.data;showApp()}else{showLogin()}
}

function showLogin(){
  document.getElementById('tabBar').style.display='none';
  document.getElementById('userBadge').style.display='none';
  document.getElementById('app').innerHTML=`
    <div class="login-page">
      <div class="logo">📊</div>
      <h2>网格交易管理系统</h2>
      <p>云端版 · 随时随地管理网格策略</p>
      <button class="btn-login" onclick="location.href='/api/auth/wechat'">微信登录</button>
      <p style="margin-top:16px;font-size:12px;color:#ccc">或 <a href="/api/auth/dev-login" style="color:#07c160">开发者快速登录</a></p>
    </div>`;
}

function showApp(){
  document.getElementById('tabBar').style.display='flex';
  document.getElementById('userBadge').style.display='flex';
  document.getElementById('userName').textContent=currentUser.nickname||'用户';
  loadStockList();
}

function showUserMenu(){
  if(confirm('退出登录？')){document.cookie='token=;Max-Age=0;path=/';currentUser=null;showLogin()}
}

function switchTab(tab){
  document.querySelectorAll('.tab-bar button').forEach(b=>b.classList.remove('active'));
  if(tab==='stocks'){document.querySelectorAll('.tab-bar button')[0].classList.add('active');loadStockList()}
}

// ── 标的列表 ──
async function loadStockList(){
  const r=await api('/api/stocks');
  if(r.code!==0){toast(r.errorMsg);return}
  let html='';
  if(r.data.length===0){
    html='<div class="empty"><div class="icon">📈</div><p>还没有标的，点击下方 + 添加</p></div>';
  }else{
    for(const s of r.data){
      html+=`<div class="stock-card" onclick="loadStockDetail(${s.id})">
        <div class="header"><div><span class="name">${s.name}</span><span class="code">${s.code}</span></div><span class="mode-tag">${s.mode.toUpperCase()}</span></div>
        <div class="price">${s.current_price?s.current_price.toFixed(3):'-'}</div>
        <div class="meta"><span><span class="label">基础资金</span> ¥${s.base_cash.toLocaleString()}</span><span><span class="label">小网</span> ${(s.sgrid_step_pct*100).toFixed(1)}%</span><span><span class="label">中网</span> ${(s.mgrid_step_pct*100).toFixed(1)}%</span><span><span class="label">大网</span> ${(s.lgrid_step_pct*100).toFixed(1)}%</span></div>
      </div>`;
    }
  }
  html+='<button class="add-stock-btn" onclick="openModal(\'addStockModal\')">＋ 添加标的</button>';
  document.getElementById('app').innerHTML=html;
}

// ── 标的详情 ──
async function loadStockDetail(id){
  currentStockId=id;
  document.getElementById('tabBar').style.display='none';
  document.getElementById('app').innerHTML='<div class="empty"><div class="icon">⏳</div><p>加载中...</p></div>';

  const r=await api('/api/stocks/'+id);
  if(r.code!==0){toast(r.errorMsg);return}

  const {stock,gridResult}=r.data;
  const {grids,holding,records}=gridResult;
  const tradeRecords=records||[];
  let h='';

  // Header
  h+=`<div class="detail-header">
    <button class="back-btn" onclick="showApp()">← 返回列表</button>
    <div class="title">${stock.name} <span style="font-size:13px;color:#999">${stock.code}</span></div>
    <div class="subtitle">${stock.market.toUpperCase()} · ${stock.mode.toUpperCase()} · ${stock.control}</div>
    <div class="price-input-row">
      <input type="number" id="priceInput" value="${stock.current_price}" step="0.001" placeholder="当前价格">
      <button onclick="updatePrice(${id})">更新价格</button>
    </div>
  </div>`;

  // Grid Table
  h+=`<div class="panel"><div class="panel-title">🔲 交易网格</div><div style="overflow-x:auto"><table class="grid-table">
    <thead><tr><th>类型</th><th>档</th><th>买入价</th><th>买入数</th><th>卖出价</th><th>卖出数</th><th>止盈利</th><th>清仓利</th></tr></thead><tbody>`;

  for(const g of grids){
    const tc=g.grid_type==='sgrid'?'type-sgrid':g.grid_type==='mgrid'?'type-mgrid':'type-lgrid';
    const tl=g.grid_type==='sgrid'?'小网':g.grid_type==='mgrid'?'中网':'大网';
    const bc=g.trigger_buy?'triggered':'';
    const sc=g.trigger_sell?'triggered':'';
    h+=`<tr><td class="${tc}">${tl}</td><td>L${g.level}</td>
      <td class="buy-cell ${bc}">${g.buy_price?g.buy_price.toFixed(3):'-'}</td><td>${g.buy_count||'-'}</td>
      <td class="sell-cell ${sc}">${g.sell_price?g.sell_price.toFixed(3):'-'}</td><td>${g.sell_count||'-'}</td>
      <td class="${(g.profit_on_sell||0)>0?'profit':''}">${g.profit_on_sell?g.profit_on_sell.toFixed(2):'-'}</td>
      <td class="${(g.profit_on_clear||0)>0?'profit':''}">${g.profit_on_clear?g.profit_on_clear.toFixed(2):'-'}</td></tr>`;
  }
  h+='</tbody></table></div></div>';

  // Holding Analysis
  if(holding&&holding.length>0){
    const ho=holding[0];
    h+=`<div class="panel"><div class="panel-title">📊 持仓分析</div><div class="stat-grid">
      <div class="stat-item"><div class="value">${ho.net_count}</div><div class="label">净持仓</div></div>
      <div class="stat-item"><div class="value">${ho.avg_cost?ho.avg_cost.toFixed(3):'-'}</div><div class="label">成本价</div></div>
      <div class="stat-item"><div class="value ${ho.profit>0?'profit':'loss'}">${ho.profit?ho.profit.toFixed(2):'0'}</div><div class="label">浮盈亏</div></div>
      <div class="stat-item"><div class="value">${ho.profit_pct?(ho.profit_pct*100).toFixed(2)+'%':'-'}</div><div class="label">收益率</div></div>
      <div class="stat-item"><div class="value">${ho.total_buy_count}</div><div class="label">累计买入</div></div>
      <div class="stat-item"><div class="value">${ho.total_sell_count}</div><div class="label">累计卖出</div></div>
    </div></div>`;
  }

  // Total PnL
  h+=`<div class="panel"><div class="panel-title">💰 盈亏总览</div><div class="stat-grid">
    <div class="stat-item"><div class="value">¥${gridResult.total_cost?gridResult.total_cost.toFixed(2):'0'}</div><div class="label">总投入</div></div>
    <div class="stat-item"><div class="value">¥${gridResult.total_value?gridResult.total_value.toFixed(2):'0'}</div><div class="label">当前市值</div></div>
    <div class="stat-item"><div class="value ${gridResult.total_profit>0?'profit':'loss'}">¥${gridResult.total_profit?gridResult.total_profit.toFixed(2):'0'}</div><div class="label">总盈亏</div></div>
  </div></div>`;

  // Trades
  h+=`<div class="panel"><div class="panel-title">📝 交易记录 <button style="margin-left:auto;background:#07c160;color:#fff;border:none;padding:4px 12px;border-radius:4px;font-size:12px;cursor:pointer" onclick="openAddTrade(${id})">+ 添加</button></div>`;
  if(!tradeRecords||tradeRecords.length===0){
    h+='<p style="text-align:center;color:#ccc;padding:16px">暂无交易记录</p>';
  }else{
    h+='<ul class="trade-list">';
    for(const t of tradeRecords){
      h+=`<li class="trade-item"><div class="info">
        <span class="type-badge ${t.type==='BUY'?'buy':'sell'}">${t.type==='BUY'?'买入':'卖出'}</span>
        <span class="price-count">${(t.price||0).toFixed(3)} × ${t.count}</span>
        ${t.grid_label?'<span style="font-size:11px;color:#999">'+t.grid_label+'</span>':''}
      </div><span class="trade-date">${t.date||''}</span></li>`;
    }
    h+='</ul>';
  }
  h+='</div>';

  document.getElementById('app').innerHTML=h;
  window.scrollTo(0,0);
}

// ── 操作 ──
async function updatePrice(id){
  const p=parseFloat(document.getElementById('priceInput').value);
  if(!p||p<=0){toast('请输入有效价格');return}
  const r=await api('/api/stocks/'+id+'/price',{method:'PUT',body:{price:p}});
  if(r.code===0){toast('价格已更新');loadStockDetail(id)}else{toast(r.errorMsg)}
}

async function submitStock(){
  const d={
    code:document.getElementById('stockCode').value.trim(),
    name:document.getElementById('stockName').value.trim(),
    market:document.getElementById('stockMarket').value,
    mode:document.getElementById('stockMode').value,
    baseCash:parseFloat(document.getElementById('stockBaseCash').value),
    sgridStepPct:parseFloat(document.getElementById('stockSgridStep').value)/100,
    mgridStepPct:parseFloat(document.getElementById('stockMgridStep').value)/100,
    lgridStepPct:parseFloat(document.getElementById('stockLgridStep').value)/100,
  };
  if(!d.code||!d.name){toast('请填写代码和名称');return}
  const r=await api('/api/stocks',{method:'POST',body:d});
  if(r.code===0){toast('添加成功');closeModal('addStockModal');loadStockList()}else{toast(r.errorMsg)}
}

function openAddTrade(id){
  currentStockId=id;
  document.getElementById('tradeDate').value=new Date().toISOString().slice(0,10);
  openModal('addTradeModal');
}

async function submitTrade(){
  const d={
    type:document.getElementById('tradeType').value,
    date:document.getElementById('tradeDate').value,
    price:parseFloat(document.getElementById('tradePrice').value),
    count:parseInt(document.getElementById('tradeCount').value),
    gridLabel:document.getElementById('tradeGridLabel').value.trim()
  };
  if(!d.date||!d.price||!d.count){toast('请填写完整信息');return}
  const r=await api('/api/stocks/'+currentStockId+'/trades',{method:'POST',body:d});
  if(r.code===0){toast('交易已记录');closeModal('addTradeModal');loadStockDetail(currentStockId)}else{toast(r.errorMsg)}
}

init();
</script>
</body>
</html>
