<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no">
<title>财经资讯 - 网格交易系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#333;font-size:14px}
.navbar{background:linear-gradient(135deg,#07c160,#06ad56);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.navbar h1{font-size:17px;font-weight:600}
.nav-links{display:flex;gap:12px;align-items:center}
.nav-links a{color:rgba(255,255,255,.85);text-decoration:none;font-size:13px;padding:4px 8px;border-radius:4px}
.nav-links a:hover,.nav-links a.active{background:rgba(255,255,255,.2);color:#fff}
.container{max-width:960px;margin:0 auto;padding:12px;padding-bottom:80px}

/* 筛选栏 */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border:1px solid #ddd;border-radius:16px;background:#fff;font-size:13px;cursor:pointer;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:#07c160;color:#fff;border-color:#07c160}

/* 资讯卡片 */
.news-card{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:transform .15s;position:relative}
.news-card:active{transform:scale(.98)}
.news-card.border-flash{border-left:3px solid #e65100}
.news-card.border-report{border-left:3px solid #1565c0}
.news-card.border-telegraph{border-left:3px solid #9c27b0}
.news-card.important{border-left:3px solid #e74c3c}

.news-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.news-time{font-size:12px;color:#999}
.news-source{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.source-jin10{background:#fff3e0;color:#e65100}
.source-report{background:#e3f2fd;color:#1565c0}
.source-cls{background:#f3e5f5;color:#7b1fa2}
.source-other{background:#f5f5f5;color:#666}
.source-intl{background:#e8f5e9;color:#2e7d32}

.news-title{font-size:14px;font-weight:600;line-height:1.5;margin-bottom:4px}
.news-summary{font-size:13px;line-height:1.6;color:#555}
.news-summary .ellipsis{color:#07c160;font-size:12px;cursor:pointer}
.news-stock{font-size:11px;color:#07c160;margin-top:6px}
.important-badge{display:inline-block;font-size:11px;background:#e74c3c;color:#fff;padding:1px 6px;border-radius:3px;margin-right:4px;font-weight:500}

/* 展开弹窗 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:80vh;padding:20px;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.modal-title{font-size:16px;font-weight:700;line-height:1.5;flex:1;margin-right:12px}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#999;flex-shrink:0}
.modal-meta{display:flex;gap:10px;align-items:center;margin-bottom:14px;font-size:12px;color:#999}
.modal-content{font-size:15px;line-height:1.8;color:#333;white-space:pre-wrap}
.modal-link{display:block;margin-top:14px;color:#07c160;font-size:13px;text-decoration:none}

.loading{text-align:center;padding:40px;color:#999;font-size:14px}
.empty{text-align:center;padding:60px 20px;color:#ccc;font-size:14px}
</style>
</head>
<body>

<div class="navbar">
  <h1>📰 财经资讯</h1>
  <div class="nav-links">
    <a href="/">标的</a>
    <a href="/market">行情</a>
    <a href="/news" class="active">资讯</a>
  </div>
</div>

<div class="container">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterNews('all')">全部</button>
    <button class="filter-btn" onclick="filterNews('important')">⚡ 重要</button>
    <button class="filter-btn" onclick="filterNews('快讯')">快讯</button>
    <button class="filter-btn" onclick="filterNews('电报')">电报</button>
    <button class="filter-btn" onclick="filterNews('国际')">国际</button>
  </div>

  <div id="news-list">
    <div class="loading">加载中...</div>
  </div>
</div>

<!-- 展开全文弹窗 -->
<div class="modal-overlay" id="detail-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="modal-content" id="modal-content"></div>
    <a id="modal-link" class="modal-link" target="_blank" style="display:none">查看原文 →</a>
  </div>
</div>

<script>
let allNews = [];
const SUMMARY_LEN = 100;

function filterNews(type) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  let filtered = allNews;
  if (type === 'important') {
    filtered = allNews.filter(n => n.important);
  } else if (type !== 'all') {
    filtered = allNews.filter(n => n.category === type);
  }
  renderNews(filtered);
}

function getSourceClass(source, category) {
  if (source === '金十快讯') return 'source-jin10';
  if (category === '研报') return 'source-report';
  if (category === '电报') return 'source-cls';
  if (category === '国际') return 'source-intl';
  return 'source-other';
}

function getBorderClass(category) {
  if (category === '快讯') return 'border-flash';
  if (category === '研报') return 'border-report';
  if (category === '电报') return 'border-telegraph';
  return '';
}

function truncateText(text, maxLen) {
  if (!text) return '';
  if (text.length <= maxLen) return { short: text, truncated: false };
  return { short: text.slice(0, maxLen), truncated: true };
}

function renderNews(news) {
  const el = document.getElementById('news-list');
  if (!news || news.length === 0) {
    el.innerHTML = '<div class="empty">暂无资讯</div>';
    return;
  }
  el.innerHTML = news.map((item, idx) => {
    const sourceClass = getSourceClass(item.source, item.category);
    const borderClass = item.important ? 'important' : getBorderClass(item.category);
    const importantBadge = item.important ? '<span class="important-badge">重要</span>' : '';
    const stock = item.stock ? `<div class="news-stock">📋 ${item.stock}</div>` : '';
    const titleText = item.title || '';
    const contentText = item.content || titleText;
    const result = truncateText(contentText, SUMMARY_LEN);

    return `<div class="news-card ${borderClass}" onclick="openDetail(${idx})">
      <div class="news-meta">
        <span class="news-time">${item.date || ''}</span>
        <span class="news-source ${sourceClass}">${item.source || ''}</span>
      </div>
      <div class="news-title">${importantBadge}${titleText}</div>
      <div class="news-summary">${escHtml(result.short)}${result.truncated ? '<span class="ellipsis">... 展开</span>' : ''}</div>
      ${stock}
    </div>`;
  }).join('');
}

function openDetail(idx) {
  const item = allNews[idx];
  if (!item) return;
  document.getElementById('modal-title').textContent = item.title || '';
  const importantBadge = item.important ? '<span class="important-badge">重要</span> ' : '';
  document.getElementById('modal-meta').innerHTML = `
    <span class="news-source ${getSourceClass(item.source, item.category)}">${item.source || ''}</span>
    <span>${item.date || ''}</span>
    ${item.stock ? '<span>📋 ' + item.stock + '</span>' : ''}
  `;
  document.getElementById('modal-content').innerHTML = importantBadge + escHtml(item.content || item.title || '');
  const link = document.getElementById('modal-link');
  if (item.url) {
    link.href = item.url;
    link.style.display = 'block';
  } else {
    link.style.display = 'none';
  }
  document.getElementById('detail-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('detail-modal').classList.remove('show');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function loadNews() {
  try {
    const resp = await fetch('/api/news');
    const data = await resp.json();
    if (data.code === 0) {
      allNews = data.data || [];
      renderNews(allNews);
    } else {
      document.getElementById('news-list').innerHTML = '<div class="empty">加载失败</div>';
    }
  } catch(e) {
    document.getElementById('news-list').innerHTML = '<div class="empty">网络错误</div>';
  }
}

loadNews();
</script>
</body>
</html>
